# Deploys site/ to GitHub Pages on every push to main that touches site/.
#
# Requires:
#   - Repo must be public (or on a paid plan that supports private Pages)
#   - GitHub Pages enabled in Settings -> Pages -> Source: GitHub Actions
#
# The site/ directory is uploaded as-is. No build step, no transform.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
