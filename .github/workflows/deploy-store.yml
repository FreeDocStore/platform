name: Deploy Store

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'books/**'
      - '.github/workflows/deploy-store.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-store
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble store artifact
        run: |
          set -euo pipefail
          rm -rf _pages
          mkdir -p _pages
          cp -R site/. _pages/
          if [ -d books ]; then
            for docs_dir in books/*/docs; do
              [ -d "$docs_dir" ] || continue
              slug="$(basename "$(dirname "$docs_dir")")"
              mkdir -p "_pages/books/$slug"
              cp -R "$docs_dir"/. "_pages/books/$slug/"
            done
          fi

      - name: Deploy to Cloudflare Pages
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.91.0'
          command: pages deploy _pages --project-name=freedocstore
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cloudflare secrets missing
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: |
          echo "::notice::Cloudflare deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository or organization secrets to enable automatic production deploys."
