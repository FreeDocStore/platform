name = "freedocstore-api"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
EDITOR_BASE_URL = "https://freedocstore-editor.pages.dev"
PUBLIC_BASE_URL = "https://freedocstore.pages.dev"
COOKIE_DOMAIN = ""
GITHUB_ORG = "FreeDocStore"

# Required secrets:
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
# wrangler secret put GITHUB_TOKEN
# wrangler secret put OPENAI_API_KEY
#
# GitHub OAuth callback:
# https://freedocstore-api.serge-the-dev.workers.dev/auth/github/callback
#
# Intended production route once freedocstore.online is attached:
# [[routes]]
# pattern = "api.freedocstore.online/*"
# zone_name = "freedocstore.online"

[[kv_namespaces]]
binding = "FDS_API_KV"
id = "7efa958454744e938ba2cf8e5439e71a"
