name: Docs Lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  lint:
    uses: Glassdocs/glassdocs/.github/workflows/docs-lint.yml@main
    secrets: inherit   # required - the reusable workflow uses a GitHub App
                       # token to check out Glassdocs.
    # Pre-sales is the only repo allowed to have financial/contractual content.
    # Uncomment for pre-sales only:
    # with:
    #   allow-financial: true
